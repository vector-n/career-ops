# ── Job Board Searches ─────────────────────────────────
job_boards:

  linkedin:
    enabled: true
    queries:
      - query: "petroleum engineer remote"
        filters: { remote: true }
      - query: "drilling engineer entry level"
        filters: { experience: ["entry", "associate"] }
      - query: "reservoir simulation engineer"
        filters: { remote: true }
      - query: "petrophysics engineer"
      - query: "PETREL reservoir engineer"
      - query: "CMG reservoir simulation"
      - query: "ArcGIS oil gas engineer"
      - query: "petroleum engineering lecturer"
      - query: "subsurface engineer remote"
      - query: "energy data analyst petroleum"

  indeed:
    enabled: true
    queries:
      - "petroleum engineer remote"
      - "drilling engineer"
      - "reservoir engineer"
      - "petrophysics engineer"
      - "PETREL PROSPER engineer"
    locations: ["Remote", "UAE", "Qatar", "Saudi Arabia", "Malaysia"]

  glassdoor:
    enabled: true
    queries:
      - "petroleum engineer"
      - "drilling engineer"
      - "reservoir simulation"

  wellfound:
    enabled: true
    queries:
      - "petroleum engineer"
      - "energy engineer"
      - "subsurface engineer"

  greenhouse:
    enabled: true
    queries:
      - "petroleum engineer"
      - "reservoir engineer"
      - "drilling engineer"

  lever:
    enabled: true
    queries:
      - "petroleum engineer"
      - "energy engineer"

